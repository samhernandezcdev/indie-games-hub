<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Demo Runner</title>
  <style>
    /* ---- PS3-safe: sin box-shadow, sin blur ---- */
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }

    body {
      background: #0a0a12;
      color: #f0f0f0;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      width: 1280px;
      height: 676px; /* 720 - 44px topbar */
      -webkit-user-select: none;
      user-select: none;
    }

    #game-canvas {
      display: block;
      background: #0a0a12;
      /* GPU layer */
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    /* HUD overlay */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      padding: 16px 24px;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-pack: justify;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      -webkit-box-align: start;
      -webkit-align-items: flex-start;
      align-items: flex-start;
    }

    .hud-block { }

    .hud-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #444;
      display: block;
      margin-bottom: 2px;
    }

    .hud-value {
      font-size: 28px;
      letter-spacing: 2px;
      color: #00ff88;
    }

    .hud-best {
      font-size: 16px;
      color: #555;
      letter-spacing: 2px;
    }

    /* Pantallas */
    .screen {
      position: absolute;
      inset: 0;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      gap: 20px;
      background: rgba(10, 10, 18, 0.92);
    }

    .screen h1 {
      font-size: 48px;
      letter-spacing: 8px;
      color: #f0f0f0;
    }

    .screen .subtitle {
      font-size: 18px;
      letter-spacing: 4px;
      color: #00ff88;
    }

    .screen .score-display {
      font-size: 64px;
      letter-spacing: 4px;
      color: #00ff88;
      margin: 10px 0;
    }

    .screen .best-display {
      font-size: 18px;
      color: #555;
      letter-spacing: 3px;
    }

    .screen .hint {
      font-size: 16px;
      color: #555;
      letter-spacing: 3px;
      border: 1px solid #333;
      padding: 10px 24px;
      border-radius: 3px;
      -webkit-animation: blink 1.2s ease-in-out infinite;
      animation: blink 1.2s ease-in-out infinite;
    }

    .screen .controls-grid {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }

    .ctrl-item {
      text-align: center;
      font-size: 13px;
      color: #666;
      letter-spacing: 1px;
    }

    .ctrl-btn {
      display: block;
      font-size: 22px;
      color: #4488ff;
      margin-bottom: 4px;
    }

    @-webkit-keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .hidden { display: none !important; }

    /* Barra de vida */
    #life-bar-wrap {
      position: absolute;
      bottom: 16px;
      left: 24px;
      width: 200px;
    }

    .life-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: #444;
      margin-bottom: 4px;
    }

    #life-bar-bg {
      width: 200px;
      height: 8px;
      background: #1a1a28;
      border-radius: 2px;
      overflow: hidden;
    }

    #life-bar-fill {
      height: 100%;
      background: #00ff88;
      border-radius: 2px;
      -webkit-transition: width 0.1s;
      transition: width 0.1s;
    }
  </style>
</head>
<body>

<!-- Canvas principal del juego -->
<canvas id="game-canvas" width="1280" height="676"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-block">
    <span class="hud-label">PUNTUACIÓN</span>
    <span class="hud-value" id="score-display">0</span>
  </div>
  <div class="hud-block" style="text-align:right;">
    <span class="hud-label">MEJOR</span>
    <span class="hud-best" id="best-display">0</span>
  </div>
</div>

<!-- Barra de vida -->
<div id="life-bar-wrap">
  <div class="life-label">VIDA</div>
  <div id="life-bar-bg">
    <div id="life-bar-fill" style="width:100%;"></div>
  </div>
</div>

<!-- Pantalla de inicio -->
<div id="screen-start" class="screen">
  <h1>DEMO RUNNER</h1>
  <p class="subtitle">RUNNER INFINITO 2D</p>
  <div class="controls-grid">
    <div class="ctrl-item">
      <span class="ctrl-btn">✕</span>SALTAR
    </div>
    <div class="ctrl-item">
      <span class="ctrl-btn" style="color:#cc88ff;">□</span>DOBLE SALTO
    </div>
    <div class="ctrl-item">
      <span class="ctrl-btn" style="color:#ff3355;">○</span>VOLVER
    </div>
  </div>
  <p class="hint">PRESIONA ✕ O ESPACIO PARA EMPEZAR</p>
</div>

<!-- Pantalla de Game Over -->
<div id="screen-gameover" class="screen hidden">
  <h1>GAME OVER</h1>
  <p class="score-display" id="final-score">0</p>
  <p class="best-display" id="final-best">MEJOR: 0</p>
  <p class="hint">PRESIONA ✕ PARA REINTENTAR</p>
</div>

<script>
// ============================================================
// DEMO RUNNER — Motor de juego PS3-compatible
// Vanilla JS, sin dependencias, optimizado para 30fps
// ============================================================

;(function() {
  'use strict';

  /* ---- Canvas ---- */
  var canvas = document.getElementById('game-canvas');
  var ctx    = canvas.getContext('2d');
  var W      = canvas.width;   // 1280
  var H      = canvas.height;  // 676

  /* ---- Elementos HUD ---- */
  var scoreEl      = document.getElementById('score-display');
  var bestEl       = document.getElementById('best-display');
  var finalScoreEl = document.getElementById('final-score');
  var finalBestEl  = document.getElementById('final-best');
  var screenStart  = document.getElementById('screen-start');
  var screenGO     = document.getElementById('screen-gameover');
  var lifeFill     = document.getElementById('life-bar-fill');

  /* ---- Estado del juego ---- */
  var State = {
    running:     false,
    score:       0,
    best:        0,
    life:        100,
    speed:       4,       // velocidad base px/frame
    frame:       0,
    lastTime:    0,
    canDblJump:  false
  };

  /* ---- Jugador ---- */
  var Player = {
    x: 160,
    y: 0,       // se establece en reset
    w: 36,
    h: 52,
    vy:     0,
    grounded: false,
    jumped:   false,     // primer salto
    dblJump:  false,     // doble salto usado
    color: '#00ff88',
    trailColor: 'rgba(0, 255, 136, 0.12)',
    trail: []            // posiciones anteriores
  };

  /* ---- Suelo ---- */
  var GROUND_Y = H - 90;

  /* ---- Obstáculos ---- */
  var obstacles = [];
  var OBS_SPAWN_MIN = 60;  // frames mínimos entre obstáculos
  var OBS_SPAWN_MAX = 120;
  var nextObstacle  = 80;

  /* ---- Partículas ---- */
  var particles = [];

  /* ---- Estrellas de fondo ---- */
  var stars = [];
  (function initStars() {
    for (var i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * (GROUND_Y - 40),
        size: Math.random() * 1.5 + 0.5,
        speed: Math.random() * 0.5 + 0.2
      });
    }
  })();

  /* ---- Nubes (plataformas decorativas) ---- */
  var clouds = [];
  (function initClouds() {
    for (var i = 0; i < 5; i++) {
      clouds.push({
        x: Math.random() * W,
        y: 60 + Math.random() * 120,
        w: 80 + Math.random() * 120,
        speed: 0.5 + Math.random() * 0.5
      });
    }
  })();

  /* ----------------------------------------------------------
     RESET
  ---------------------------------------------------------- */
  function reset() {
    State.running    = false;
    State.score      = 0;
    State.life       = 100;
    State.speed      = 4;
    State.frame      = 0;
    State.canDblJump = false;

    Player.x        = 160;
    Player.y        = GROUND_Y - Player.h;
    Player.vy       = 0;
    Player.grounded = true;
    Player.jumped   = false;
    Player.dblJump  = false;
    Player.trail    = [];

    obstacles = [];
    particles = [];
    nextObstacle = 80;

    updateHUD();
    updateLifeBar();
  }

  /* ----------------------------------------------------------
     SALTO
  ---------------------------------------------------------- */
  function doJump() {
    if (!State.running) {
      startGame();
      return;
    }

    if (Player.grounded) {
      Player.vy       = -14;
      Player.grounded = false;
      Player.jumped   = true;
      Player.dblJump  = false;
      spawnParticles(Player.x + Player.w/2, Player.y + Player.h, '#00ff88', 5);
    } else if (Player.jumped && !Player.dblJump) {
      // Doble salto
      Player.vy      = -12;
      Player.dblJump = true;
      spawnParticles(Player.x + Player.w/2, Player.y, '#4488ff', 8);
    }
  }

  /* ----------------------------------------------------------
     PARTÍCULAS
  ---------------------------------------------------------- */
  function spawnParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      particles.push({
        x:    x,
        y:    y,
        vx:   (Math.random() - 0.5) * 5,
        vy:   -Math.random() * 5 - 1,
        life: 20 + Math.random() * 10,
        maxLife: 30,
        color: color,
        size: 2 + Math.random() * 3
      });
    }
  }

  /* ----------------------------------------------------------
     CREAR OBSTÁCULO
  ---------------------------------------------------------- */
  function spawnObstacle() {
    var type = Math.random() < 0.7 ? 'ground' : 'air';
    var obs;

    if (type === 'ground') {
      var h = 30 + Math.floor(Math.random() * 50);
      obs = {
        x:    W + 20,
        y:    GROUND_Y - h,
        w:    20 + Math.floor(Math.random() * 20),
        h:    h,
        type: 'ground',
        color: '#ff3355'
      };
    } else {
      // Obstáculo aéreo (hay que agacharse... o saltar por debajo)
      obs = {
        x: W + 20,
        y: GROUND_Y - 120 - Math.random() * 40,
        w: 60,
        h: 16,
        type: 'air',
        color: '#ffcc00'
      };
    }

    obstacles.push(obs);
    nextObstacle = State.frame +
      Math.floor(Math.random() * (OBS_SPAWN_MAX - OBS_SPAWN_MIN) + OBS_SPAWN_MIN);
  }

  /* ----------------------------------------------------------
     COLISIÓN
  ---------------------------------------------------------- */
  function checkCollision(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
  }

  /* ----------------------------------------------------------
     UPDATE
  ---------------------------------------------------------- */
  function update() {
    if (!State.running) return;

    State.frame++;
    State.score += 1;

    // Aumentar velocidad cada 200 frames
    if (State.frame % 200 === 0) {
      State.speed = Math.min(State.speed + 0.3, 12);
    }

    /* ---- Física del jugador ---- */
    Player.vy += 0.7; // gravedad
    Player.y  += Player.vy;

    // Suelo
    if (Player.y + Player.h >= GROUND_Y) {
      Player.y        = GROUND_Y - Player.h;
      Player.vy       = 0;
      Player.grounded = true;
      Player.jumped   = false;
      Player.dblJump  = false;
    }

    // Trail
    Player.trail.push({ x: Player.x, y: Player.y });
    if (Player.trail.length > 12) Player.trail.shift();

    /* ---- Obstáculos ---- */
    if (State.frame >= nextObstacle) {
      spawnObstacle();
    }

    var i;
    for (i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].x -= State.speed;

      if (obstacles[i].x + obstacles[i].w < 0) {
        obstacles.splice(i, 1);
        continue;
      }

      if (checkCollision(Player, obstacles[i])) {
        // Hit!
        State.life -= 34;
        spawnParticles(Player.x + Player.w/2, Player.y + Player.h/2, '#ff3355', 12);
        obstacles.splice(i, 1);
        updateLifeBar();

        if (State.life <= 0) {
          gameOver();
          return;
        }
        // Pequeño rebote
        Player.vy = -8;
        Player.y  -= 5;
      }
    }

    /* ---- Partículas ---- */
    for (i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x   += p.vx;
      p.y   += p.vy;
      p.vy  += 0.2;
      p.life -= 1;
      if (p.life <= 0) particles.splice(i, 1);
    }

    /* ---- Estrellas (parallax) ---- */
    for (i = 0; i < stars.length; i++) {
      stars[i].x -= stars[i].speed;
      if (stars[i].x < 0) stars[i].x = W;
    }

    /* ---- Nubes ---- */
    for (i = 0; i < clouds.length; i++) {
      clouds[i].x -= clouds[i].speed;
      if (clouds[i].x + clouds[i].w < 0) {
        clouds[i].x = W + 20;
        clouds[i].y = 60 + Math.random() * 120;
      }
    }

    /* ---- HUD ---- */
    if (State.frame % 6 === 0) { // No actualizar DOM cada frame (lento en PS3)
      updateHUD();
    }
  }

  /* ----------------------------------------------------------
     RENDER
  ---------------------------------------------------------- */
  function render() {
    ctx.clearRect(0, 0, W, H);

    /* ---- Fondo ---- */
    // Gradiente simple (sin blur)
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);

    // Líneas horizontales tenues (efecto CRT)
    ctx.strokeStyle = 'rgba(0,255,136,0.02)';
    ctx.lineWidth   = 1;
    for (var line = 0; line < H; line += 6) {
      ctx.beginPath();
      ctx.moveTo(0, line);
      ctx.lineTo(W, line);
      ctx.stroke();
    }

    /* ---- Estrellas ---- */
    for (var si = 0; si < stars.length; si++) {
      var st = stars[si];
      ctx.fillStyle = 'rgba(255,255,255,' + (st.size * 0.2) + ')';
      ctx.fillRect(Math.floor(st.x), Math.floor(st.y), Math.ceil(st.size), Math.ceil(st.size));
    }

    /* ---- Nubes ---- */
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    for (var ci = 0; ci < clouds.length; ci++) {
      var cl = clouds[ci];
      ctx.fillRect(Math.floor(cl.x), Math.floor(cl.y), cl.w, 12);
    }

    /* ---- Suelo ---- */
    ctx.fillStyle = '#1a1a28';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.fillStyle = '#00ff88';
    ctx.fillRect(0, GROUND_Y, W, 2);

    /* ---- Trail del jugador ---- */
    for (var ti = 0; ti < Player.trail.length; ti++) {
      var tp = Player.trail[ti];
      var alpha = ti / Player.trail.length * 0.3;
      ctx.fillStyle = 'rgba(0, 255, 136, ' + alpha + ')';
      ctx.fillRect(
        Math.floor(tp.x + 6),
        Math.floor(tp.y + 8),
        Player.w - 12,
        Player.h - 16
      );
    }

    /* ---- Jugador ---- */
    ctx.fillStyle = Player.color;
    // Cuerpo
    ctx.fillRect(
      Math.floor(Player.x),
      Math.floor(Player.y),
      Player.w,
      Player.h
    );
    // Ojos
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(Math.floor(Player.x + 20), Math.floor(Player.y + 12), 8, 8);
    // Brillo en el ojo
    ctx.fillStyle = '#fff';
    ctx.fillRect(Math.floor(Player.x + 22), Math.floor(Player.y + 14), 3, 3);
    // Líneas corporales
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(Math.floor(Player.x + 4),  Math.floor(Player.y + Player.h - 16), 4, 12);
    ctx.fillRect(Math.floor(Player.x + 28), Math.floor(Player.y + Player.h - 16), 4, 12);

    /* ---- Obstáculos ---- */
    for (var oi = 0; oi < obstacles.length; oi++) {
      var ob = obstacles[oi];
      ctx.fillStyle = ob.color;
      ctx.fillRect(Math.floor(ob.x), Math.floor(ob.y), ob.w, ob.h);
      // Tope del obstáculo
      ctx.fillStyle = '#fff';
      ctx.fillRect(Math.floor(ob.x), Math.floor(ob.y), ob.w, 2);
    }

    /* ---- Partículas ---- */
    for (var pi = 0; pi < particles.length; pi++) {
      var pt = particles[pi];
      var pa = pt.life / pt.maxLife;
      ctx.globalAlpha = pa;
      ctx.fillStyle   = pt.color;
      ctx.fillRect(
        Math.floor(pt.x - pt.size/2),
        Math.floor(pt.y - pt.size/2),
        Math.ceil(pt.size),
        Math.ceil(pt.size)
      );
    }
    ctx.globalAlpha = 1;

    /* ---- Velocímetro (barra lateral) ---- */
    var speedPct = (State.speed - 4) / (12 - 4);
    ctx.fillStyle = '#1a1a28';
    ctx.fillRect(W - 24, GROUND_Y - 120, 10, 120);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(W - 24, GROUND_Y - Math.floor(120 * speedPct), 10, Math.floor(120 * speedPct));

    /* ---- Indicador de doble salto disponible ---- */
    if (!Player.dblJump && !Player.grounded) {
      ctx.fillStyle = 'rgba(68,136,255,0.5)';
      ctx.fillRect(Math.floor(Player.x), Math.floor(Player.y - 8), Player.w, 4);
    }
  }

  /* ----------------------------------------------------------
     LOOP PRINCIPAL (30fps en PS3, rAF)
  ---------------------------------------------------------- */
  var RAF_INTERVAL = 1000 / 30; // ~33ms

  function loop(timestamp) {
    var now   = timestamp || Date.now();
    var delta = now - State.lastTime;

    if (delta >= RAF_INTERVAL) {
      State.lastTime = now - (delta % RAF_INTERVAL);
      update();
      render();
    }

    if (window.requestAnimationFrame) {
      requestAnimationFrame(loop);
    } else {
      setTimeout(function() { loop(Date.now()); }, 16);
    }
  }

  /* ----------------------------------------------------------
     HUD
  ---------------------------------------------------------- */
  function updateHUD() {
    if (scoreEl) scoreEl.textContent = State.score;
    if (bestEl)  bestEl.textContent  = State.best;
  }

  function updateLifeBar() {
    if (lifeFill) {
      lifeFill.style.width = Math.max(0, State.life) + '%';
      if (State.life < 35) {
        lifeFill.style.background = '#ff3355';
      } else if (State.life < 65) {
        lifeFill.style.background = '#ffcc00';
      } else {
        lifeFill.style.background = '#00ff88';
      }
    }
  }

  /* ----------------------------------------------------------
     ESTADOS DE JUEGO
  ---------------------------------------------------------- */
  function startGame() {
    screenStart.classList.add('hidden');
    screenGO.classList.add('hidden');
    State.running = true;
    State.lastTime = Date.now();
  }

  function gameOver() {
    State.running = false;
    if (State.score > State.best) {
      State.best = State.score;
      // Guardar en hub storage si está disponible
      if (window.parent && window.parent.HubStorage) {
        window.parent.HubStorage.saveScore('demo-runner', State.best);
      }
    }
    if (finalScoreEl) finalScoreEl.textContent = State.score;
    if (finalBestEl)  finalBestEl.textContent  = 'MEJOR: ' + State.best;
    screenGO.classList.remove('hidden');
  }

  function handleInput() {
    if (!State.running && screenGO && !screenGO.classList.contains('hidden')) {
      // Reiniciar
      reset();
      startGame();
    } else {
      doJump();
    }
  }

  /* ----------------------------------------------------------
     CONTROLES
  ---------------------------------------------------------- */
  // Teclado
  document.addEventListener('keydown', function(e) {
    if (e.keyCode === 32 || e.keyCode === 38 || e.keyCode === 87) { // Espacio, ↑, W
      handleInput();
      e.preventDefault();
    }
    if (e.keyCode === 27) { // Esc = volver al hub
      if (window.parent && window.parent.GameLauncher) {
        window.parent.GameLauncher.returnToHub();
      } else if (window.parent) {
        window.parent.postMessage({ type: 'returnToHub' }, '*');
      }
    }
  }, false);

  // Touch (tablet/PS3 con touch)
  document.addEventListener('touchstart', function(e) {
    handleInput();
    e.preventDefault();
  }, false);

  // Gamepad — polling básico
  var padPrev = {};
  setInterval(function() {
    if (!navigator.getGamepads) return;
    var pads = navigator.getGamepads();
    for (var i = 0; i < pads.length; i++) {
      var pad = pads[i];
      if (!pad || !pad.connected) continue;

      var cross  = pad.buttons[0];
      var circle = pad.buttons[1];
      var crossPressed  = (typeof cross  === 'object' ? cross.pressed  : cross  > 0.5);
      var circlePressed = (typeof circle === 'object' ? circle.pressed : circle > 0.5);

      if (crossPressed && !padPrev.cross) {
        handleInput();
      }
      if (circlePressed && !padPrev.circle) {
        // Volver al hub
        if (window.parent && window.parent.GameLauncher) {
          window.parent.GameLauncher.returnToHub();
        } else {
          window.parent.postMessage({ type: 'returnToHub' }, '*');
        }
      }

      padPrev.cross  = crossPressed;
      padPrev.circle = circlePressed;
    }
  }, 50);

  /* ----------------------------------------------------------
     INICIO
  ---------------------------------------------------------- */
  reset();
  render(); // Primer render estático

  // Arrancar loop
  if (window.requestAnimationFrame) {
    requestAnimationFrame(loop);
  } else {
    setTimeout(function() { loop(Date.now()); }, 33);
  }

})();
</script>

</body>
</html>
