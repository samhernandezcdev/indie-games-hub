<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>INDIE HUB - SAM'S GAME PORTAL</title>
  <link rel="stylesheet" href="styles/hub.css" />
</head>
<body>
  <div id="gamepad-indicator" class="gamepad-indicator disconnected">
    <span class="led"></span>
    <span class="label">MANDO</span>
  </div>

  <div id="ps3-welcome" class="ps3-welcome hidden">
    <div class="ps3-welcome-inner">
      <div class="ps3-logo">PlayStation</div>
      <h1>Bienvenido(a) al INDIE HUB</h1>
      <p>Portal de juegos optimizado para tu consola</p>
      <div class="ps3-btn-hint">Presiona <span class="btn-x">✕</span> para continuar</div>
    </div>
  </div>

  <header class="hub-header">
    <div class="hub-logo">
      <span class="logo-indie">INDIE</span>
      <span class="logo-hub">HUB</span>
    </div>
    <nav class="hub-nav">
      <span class="nav-hint"><span class="btn-dpad">✜</span> Navegar</span>
      <span class="nav-hint"><span class="btn-dpad">✕</span> Jugar</span>
      <span class="nav-hint"><span class="btn-dpad">□</span> Info</span>
    </nav>
    <div class="hub-clock" id="hub-clock">00:00</div>
  </header>
</body>
</html>
